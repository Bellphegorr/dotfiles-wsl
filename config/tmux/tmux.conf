# Prefixo
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse
set -g mouse on

# Histórico
set -g history-limit 100000

# Divisões
bind | split-window -h
bind - split-window -v

# Recarregar configuração
bind r source-file ~/.config/tmux/tmux.conf

# Numeração iniciando em 1
set -g base-index 1
setw -g pane-base-index 1

# Renumera janelas ao fechar
set -g renumber-windows on

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-save-interval '10'
set -g @continuum-restore 'off'
set -g @continuum-boot 'off'
set -g @resurrect-capture-pane-contents 'on'

# Garante o hook de auto-save do continuum no status-right
set -g status-right "#(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %H:%M %d-%b-%y"

# Inicializa o TPM
run '~/.tmux/plugins/tpm/tpm'
